name: RTL CI

on:
  push:
  pull_request:

jobs:
  rtl-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Show Verilator version
        run: verilator --version

      - name: Run RTL tests
        run: make test
